name: ci

on:
  push:
  pull_request:

jobs:
  ticket-01:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: ruff check api app scripts tests
      - run: pytest
